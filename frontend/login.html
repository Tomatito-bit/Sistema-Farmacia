<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Farmacia</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

/* ===== FONDO ANIMADO ===== */
body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#1abc9c,#3498db,#ecf0f1);
background-size:600% 600%;
animation:fondo 10s ease infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== CAJA LOGIN ===== */
.login-box{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:300px;
text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1; transform:translateY(0);}
}

.login-box h2{
margin-bottom:20px;
color:#1abc9c;
}

/* ===== INPUTS ===== */
.input-group{
position:relative;
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:10px;
border:none;
border-bottom:2px solid #ccc;
outline:none;
font-size:16px;
}

.input-group label{
position:absolute;
top:10px;
left:0;
color:#999;
font-size:14px;
transition:0.3s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
top:-10px;
font-size:12px;
color:#1abc9c;
}

/* ===== BOTONES ===== */
button{
width:100%;
padding:10px;
border:none;
background:#1abc9c;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

button:hover{
background:#16a085;
}

/* ===== TEXTO ===== */
.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="login-box">

<h2>💊 Farmacia</h2>

<form onsubmit="login(event)">

<div class="input-group">
<input type="text" id="usuario" required>
<label>Usuario</label>
</div>

<div class="input-group">
<input type="password" id="password" required>
<label>Contraseña</label>
</div>

<button type="submit">Ingresar</button>

<button type="button" onclick="irRegistro()">Crear usuario</button>

</form>

<div class="footer">
Sistema de gestión farmacéutica
</div>

</div>

<script>

// ============================
// LOGIN
// ============================

function login(e){

e.preventDefault();

let user = document.getElementById("usuario").value;
let pass = document.getElementById("password").value;

fetch("http://localhost:3000/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
usuario: user,
password: pass
})
})
.then(res => res.json())
.then(data => {

if(data.success){

//  GUARDAR SESIÓN
localStorage.setItem("usuario", user);
localStorage.setItem("rol", data.rol);

//  MENSAJE
Swal.fire({
title:"Bienvenido",
text:"Acceso correcto",
icon:"success",
timer:1500,
showConfirmButton:false
});

//  REDIRECCIÓN
setTimeout(()=>{
window.location.href="menu.html";
},1500);

}else{
Swal.fire("Error","Usuario o contraseña incorrectos","error");
}

})
.catch(()=>{
Swal.fire("Error","No conecta con el servidor","error");
});

}

// ============================
// IR A REGISTRO
// ============================

function irRegistro(){
window.location.href = "registro_usuario.html";
}

</script>

</body>
</html>
